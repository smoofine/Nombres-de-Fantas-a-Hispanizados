<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Generador de Nombres Fantásticos</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Generador de Nombres Fantásticos</h1>
    <p class="subtitle">Crea nombres hispanizados únicos para tus personajes</p>
  </header>

  <main class="generator-card">
    <div class="form-group">
      <label for="race">Raza</label>
      <select id="race"></select>
    </div>

    <div class="form-group">
      <label for="gender">Género</label>
      <select id="gender">
        <option value="m">Masculino</option>
        <option value="f">Femenino</option>
      </select>
    </div>

    <div class="form-group">
      <label for="culture">Cultura</label>
      <select id="culture"></select>
    </div>

    <div class="form-group">
      <label for="surnameType">Tipo de Apellido</label>
      <select id="surnameType">
        <option value="any">Cualquiera</option>
        <option value="profession">Oficio</option>
        <option value="place">Lugar</option>
        <option value="lineage">Linaje</option>
        <option value="deed">Hazaña</option>
        <option value="magic_affinity">Afinidad Mágica</option>
        <option value="creatures">Criaturas</option>
      </select>
    </div>

    <button id="generate" class="generate-btn">
      <span class="btn-text">Generar Nombre</span>
    </button>

    <div id="result" class="result-container"></div>
  </main>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
